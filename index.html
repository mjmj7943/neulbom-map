  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <!-- CSS: variables.css를 가장 먼저 로드해야 다른 CSS에서 변수 사용 가능 -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/legend.css" />
  <link rel="stylesheet" href="css/type.css" />
  <link rel="stylesheet" href="css/search.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>
  <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KJ22NKND"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="container">

    <header>
      <a href="https://www.goehs.kr" class="logo-link" target="_blank" rel="noopener noreferrer">
        <img src="hwaologo.svg" alt="화성오산교육지원청 로고" class="logo-left" />
      </a>
      <span class="header_text">화성오산 온동네·돌봄 교육 자원 지도</span> <!--헤더 제목 텍스트 수정 시 여기를 수정 -->
      <a href="https://neulbomhub.kosac.re.kr" class="logo-link" target="_blank" rel="noopener noreferrer">
        <img src="neulbom-logo.png" alt="늘봄허브 로고" class="logo-right" />
      </a>
    </header>

    <!-- 검색창 -->
    <div class="search-bar">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="시설 이름 검색..." autocomplete="off" />
      </div>
      <div id="search-results" class="hidden"></div>
    </div>

    <!-- 물음표 도움말 버튼 -->
    <button class="help-button">?</button>

    <!-- 행정동 표시 온오프 토글 -->
    <div class="toggle-container"> 
      <input type="checkbox" id="toggle-boundary" class="toggle-checkbox" />
      <label for="toggle-boundary" class="toggle-label">
      </label>
    </div>
    <span class="toggle-text">행정동 표시</span>

    <!-- 하단 범례 -->
    <div class="legend-bar">
        <div id="legend" class="legend"></div>
    </div>

    <!-- 시설 종류별 '더보기' 창 -->
    <div id="type-info" class="type-info hidden">
        <div class="type-info-content">
          <span class="type-info-close">×</span>
          <div class="type-info-text">
          </div>
        </div>
    </div>

    <!-- 지도 -->
    <div id="map">
    </div>

  </div>

  <!-- JS 모듈: 의존 순서대로 로드 -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/map.js"></script>
  <script src="js/boundary.js"></script>
  <script src="js/legend.js"></script>
  <script src="js/markers.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/search.js"></script>
